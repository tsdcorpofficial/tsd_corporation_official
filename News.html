    <script>
       const news_section = document.getElementById("news-section");
       const url_params = new URLSearchParams(window.location.search);
       const id_str = url_params.get('id'); 
       window.addEventListener("load", function () {
        const id = Number(id_str); 
        const news = Data_news[id-1]; 
        news_section.innerHTML = `
         <div class="fluid-container">
                    <div class="row">
                        <div class="col-lg-12 col-md-12"><div class="headers" ><h2 id="headers">${news.Headers}</h2></div></div>
                        <div class="col-lg-10 col-md-10"><div class="news-preview"><img src="${news.image}" alt="" id="news-preview"></div></div>
                        <div class="col-lg-2 col-md-12"><div class="data"><p id="data">${news.data}</p></div></div>
                        <div class="col-lg-6 col-md-12"><div class="text-news"><p id="text-news">${news.text}</p></div></div>
                    </div>
                </div>
         `
       })
    </script>
